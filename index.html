<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissor de Cotação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Estilos base para garantir a responsividade e visual moderno */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --azul-grupo: #002d5b; --borda: #cbd5e1; --fundo: #f8fafc; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); padding-top: 100px; }

        /* Cabeçalho Fixo com as duas logos */
        .fixed-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: var(--azul-grupo); display: flex; justify-content: center;
            align-items: center; gap: 80px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .fixed-header img { max-height: 45px; max-width: 40%; object-fit: contain; filter: brightness(0) invert(1); }

        /* Container do Formulário */
        .container { width: 95%; max-width: 850px; margin: 0 auto 40px; background: white; border-radius: 12px; border: 1px solid var(--borda); overflow: hidden; }
        .form-header { padding: 20px; text-align: center; border-bottom: 2px solid var(--azul-grupo); color: var(--azul-grupo); font-weight: bold; }

        /* Grid Responsiva */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 25px; }
        .full { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; font-weight: 700; color: #475569; }
        
        input, select, textarea { 
            padding: 12px; border: 2px solid var(--borda); border-radius: 8px; font-size: 1rem;
        }

        /* Grupos com unidades (R$, %, Dias) */
        .input-group { display: flex; align-items: stretch; }
        .input-group input { border-radius: 8px 0 0 8px; flex: 1; }
        .addon { 
            background: #e2e8f0; padding: 12px; border: 2px solid var(--borda); 
            border-left: none; border-radius: 0 8px 8px 0; font-weight: bold; min-width: 65px; text-align: center;
        }

        .section-divider { grid-column: 1 / -1; border-bottom: 1px solid var(--borda); color: var(--azul-grupo); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; padding: 10px 0; }

        button { grid-column: 1 / -1; background: var(--azul-grupo); color: white; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>

            <div class="field"><label>Medidas</label><input type="text" id="prod_med"></div>
            <div class="field">
                <label>Quantidade do pedido</label>
                <div class="input-group">
                    <input type="number" id="prod_qtd" required step="any">
                    <select id="prod_un" style="width: 80px; border-radius: 0 8px 8px 0; border-left: none;">
                        <option value="Kg">Kg</option>
                        <option value="Peças">Peças</option>
                        <option value="Unidades">Un</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>Valor Unitário (CIF)</label>
                <div class="input-group"><input type="number" id="val_cif" step="any"><div class="addon">R$</div></div>
            </div>
            <div class="field">
                <label>Valor Unitário (FOB)</label>
                <div class="input-group"><input type="number" id="val_fob" step="any"><div class="addon">R$</div></div>
            </div>

            <div class="section-divider">Condições</div>
            <div class="field"><label>IPI</label><div class="input-group"><input type="text" id="ipi"><div class="addon">%</div></div></div>
            <div class="field"><label>ICMS</label><div class="input-group"><input type="text" id="icms"><div class="addon">%</div></div></div>
            <div class="field"><label>Condição de Pagamento</label><div class="input-group"><input type="text" id="pgto"><div class="addon">Dias</div></div></div>
            <div class="field"><label>Prazo de Entrega</label><div class="input-group"><input type="text" id="entrega"><div class="addon">Dias</div></div></div>
            <div class="field full"><label>Validade da Proposta</label><div class="input-group"><input type="text" id="validade"><div class="addon">Dias</div></div></div>

            <button onclick="gerarPDF()">GERAR PDF</button>
        </div>
    </div>

<script>
    // Função auxiliar para pegar o valor limpo
    function pegarValor(id) {
        const el = document.getElementById(id);
        return el ? el.value.trim() : "";
    }

    // EXPLICAÇÃO: Função que verifica se os campos obrigatórios estão preenchidos
    // e se o formato dos dados (letras/números) está correto.
    function validarFormulario() {
        const camposObrigatorios = [
            { id: 'cliente', nome: 'Empresa (Para:)' },
            { id: 'att', nome: 'Aos cuidados de (Att:)' },
            { id: 'prod_desc', nome: 'Descrição do Produto' },
            { id: 'prod_med', nome: 'Medidas' },
            { id: 'prod_qtd', nome: 'Quantidade do pedido' },
            { id: 'pgto', nome: 'Condição de Pagamento' },
            { id: 'entrega', nome: 'Prazo de Entrega' },
            { id: 'validade', nome: 'Validade da Proposta' }
        ];

        // 1. Verifica se campos básicos estão vazios
        for (let campo of camposObrigatorios) {
            if (pegarValor(campo.id) === "") {
                alert(`O campo "${campo.nome}" é obrigatório!`);
                document.getElementById(campo.id).focus();
                return false;
            }
        }

        // 2. Verifica se ao menos UM dos valores (CIF ou FOB) foi preenchido
        if (pegarValor('val_cif') === "" && pegarValor('val_fob') === "") {
            alert("Você deve preencher pelo menos um dos valores: Valor Unitário (CIF) ou (FOB)!");
            return false;
        }

        // 3. Validação de Formato (Letras em campos específicos)
        const regexLetras = /^[A-Za-zÀ-ÿ\s]+$/;
        if (!regexLetras.test(pegarValor('cliente'))) {
            alert("O campo 'Empresa' deve conter apenas letras.");
            return false;
        }
        if (!regexLetras.test(pegarValor('att'))) {
            alert("O campo 'Aos cuidados de' deve conter apenas letras.");
            return false;
        }

        return true;
    }

    async function processarLogo(id) {
        try {
            const img = document.getElementById(id);
            if (!img || !img.src || img.src.length < 100) return null;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const larguraAlvo = 300;
            const escala = larguraAlvo / img.naturalWidth;
            canvas.width = larguraAlvo;
            canvas.height = img.naturalHeight * escala;
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.7);
        } catch (e) { return null; }
    }

    async function gerarPDF() {
        // EXPLICAÇÃO: Só inicia a geração se a função validarFormulario retornar 'true'
        if (!validarFormulario()) return;

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            const escolha = pegarValor('empresa_emissora');
            const idLogo = (escolha === 'tubocone') ? 'header_logo_1' : 'header_logo_2';
            const logoOtimizada = await processarLogo(idLogo);
            
            const info = {
                tubocone: { n: "TUBOCONE INDUSTRIA E COMERCIO", e: "AV PRES CASTELO BRANCO, 2010 | HORIZONTE/CE", f: "85 33361414" },
                tubonord: { n: "TUBONORD INDUSTRIA E COMERCIO", e: "AV DR LUCAS SOARES CARDOSO, 1335 | BEZERROS/PE", f: "85 994013853" }
            }[escolha] || { n: "", e: "", f: "" };

            if (logoOtimizada) {
                try { doc.addImage(logoOtimizada, 'JPEG', 15, 10, 40, 12, undefined, 'FAST'); } catch (e) {}
            }

            // --- CABEÇALHO ---
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text(info.n, 65, 18);
            doc.setFont("helvetica", "normal");
            doc.text(info.e, 65, 23);
            doc.text(`Fone: ${info.f}`, 65, 27);
            doc.text(new Date().toLocaleDateString('pt-BR'), 175, 18);
            doc.line(15, 32, 195, 32);

            // --- DESTINATÁRIO ---
            let y = 45;
            doc.setFont("helvetica", "bold");
            doc.text("DESTINATÁRIO:", 15, y);
            doc.setFont("helvetica", "normal");
            const cliente = pegarValor('cliente');
            const att = pegarValor('att');
            doc.text(`Empresa (Para:): ${cliente}`, 20, y + 8);
            doc.text(`Aos cuidados de (Att:): ${att}`, 20, y + 16);

            // --- ESPECIFICAÇÕES ---
            y = 75;
            doc.setFont("helvetica", "bold");
            doc.text("ESPECIFICAÇÕES DO PRODUTO:", 15, y);
            doc.setFont("helvetica", "normal");
            
            const desc = pegarValor('prod_desc');
            const med = pegarValor('prod_med');
            const qtd = pegarValor('prod_qtd');
            const un = pegarValor('prod_un');

            doc.text(`Descrição do Produto: ${desc}`, 20, y + 8);
            doc.text(`Medidas: ${med}`, 20, y + 16);
            doc.text(`Quantidade do pedido: ${qtd} ${un}`, 20, y + 24);

            // --- CONDIÇÕES COMERCIAIS ---
            y = 115;
            doc.setFont("helvetica", "bold");
            doc.text("CONDIÇÕES COMERCIAIS:", 15, y);
            doc.setFont("helvetica", "normal");
            y += 8;

            const condicoes = [
                { l: "Valor Unitário (CIF): R$", v: pegarValor('val_cif') },
                { l: "Valor Unitário (FOB): R$", v: pegarValor('val_fob') },
                { l: "IPI:", v: pegarValor('ipi'), s: "%" },
                { l: "ICMS:", v: pegarValor('icms'), s: "%" },
                { l: "Condição de Pagamento:", v: pegarValor('pgto'), s: " Dias" },
                { l: "Prazo de Entrega:", v: pegarValor('entrega'), s: " Dias" },
                { l: "Validade da Proposta:", v: pegarValor('validade'), s: " Dias" }
            ];

            condicoes.forEach(item => {
                if (item.v !== "") {
                    doc.text(`${item.l} ${item.v}${item.s || ""}`, 20, y);
                    y += 7;
                }
            });

            const obs = pegarValor('obs');
            if(obs) {
                y += 5;
                doc.setFont("helvetica", "bold");
                doc.text("OBSERVAÇÕES:", 15, y);
                doc.setFont("helvetica", "normal");
                const lines = doc.splitTextToSize(obs, 170);
                doc.text(lines, 20, y + 7);
            }

            // Nome do arquivo automático
            const nomeArquivo = cliente.replace(/\s+/g, '_');
            doc.save(`Cotacao_${nomeArquivo}.pdf`);

        } catch (e) {
            console.error(e);
            alert("Erro ao gerar PDF. Verifique os campos.");
        }
    }
</script>
    
</body>
</html>
