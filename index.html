<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emissor de Cotação - Corrigido</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/tom-select.complete.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --azul-grupo: #002d5b;
        --borda: #cbd5e1;
        --fundo: #f1f5f9;
        --erro: #ef4444;
        --sucesso: #22c55e;
        --alerta: #f59e0b;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: var(--fundo);
        padding-top: 110px;
      }

      .fixed-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 90px;
        background: var(--azul-grupo);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .fixed-header img {
        max-height: 40px;
        width: auto;
        filter: brightness(0) invert(1);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        margin-bottom: 50px;
      }
      .secao-divisor {
        border-top: 2px solid #f1f5f9;
        margin: 30px 0;
        padding-top: 20px;
      }

      h2 {
        color: var(--azul-grupo);
        margin-bottom: 25px;
        text-align: center;
        font-size: 24px;
      }
      h3 {
        font-size: 14px;
        color: var(--azul-grupo);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
      }

      .campo {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #475569;
        font-size: 13px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--borda);
        border-radius: 8px;
        font-size: 16px;
        outline: none;
      }
      .campo-vazio {
        border: 2px solid var(--erro) !important;
        background-color: #fff1f2 !important;
      }

      #form-produto-temp {
        background: #f8fafc;
        border: 2px solid var(--azul-grupo);
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: none;
      }
      .grid-produtos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 12px;
      }

      .lista-produtos-finalizados {
        margin-bottom: 20px;
      }
      .card-produto {
        background: #fff;
        border: 1px solid var(--borda);
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 5px solid var(--azul-grupo);
      }

      .btn-acao {
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: 0.3s;
      }
      .btn-add-main {
        background: var(--azul-grupo);
        color: white;
        width: 100%;
        margin-bottom: 20px;
      }
      .area-botoes-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 15px;
      }
      .btn-finalizar {
        background: var(--sucesso);
        color: white;
      }
      .btn-cancelar {
        background: var(--alerta);
        color: white;
      }
      .btn-gerar-pdf {
        width: 100%;
        padding: 20px;
        background: var(--azul-grupo);
        color: white;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
      }
      .btn-remover-card {
        background: #fee2e2;
        color: #dc2626;
        padding: 5px 10px;
        font-size: 11px;
      }

      @media (max-width: 600px) {
        .grid-produtos {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="fixed-header">
      <img
        src="https://i.imgur.com/83db2b.png"
        id="header_logo_tubocone"
        alt="Logo Tubocone"
      />
      <img
        src="https://i.imgur.com/83e361.png"
        id="header_logo_tubonord"
        alt="Logo Tubonord"
      />
    </div>

    <div class="container">
      <h2>Nova Cotação</h2>

      <div class="campo">
        <label>Empresa Emissora:</label>
        <select
          id="empresa_emissora"
          class="valida-pdf"
          onchange="ajustarLogosHeader()"
        >
          <option value="">-- SELECIONE A EMPRESA --</option>
          <option value="tubocone">TUBOCONE INDUSTRIA E COMERCIO</option>
          <option value="tubonord">TUBONORD INDUSTRIA E COMERCIO</option>
        </select>
      </div>

      <div class="secao-divisor">
        <h3>Dados do Cliente</h3>
        <div
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
          "
        >
          <div class="campo">
            <label>Empresa (Para:):</label
            ><input type="text" id="cliente" class="valida-pdf" />
          </div>
          <div class="campo">
            <label>Cotado por:</label
            ><input type="text" id="att" class="valida-pdf" />
          </div>
        </div>
      </div>

      <div class="secao-divisor">
        <h3>Itens da Cotação</h3>
        <div id="lista-finalizada" class="lista-produtos-finalizados"></div>

        <button
          class="btn-acao btn-add-main"
          id="btn-abrir-form"
          onclick="mostrarFormProduto()"
        >
          + Adicionar Produto
        </button>

        <div id="form-produto-temp">
          <div class="campo">
            <label>Descrição do Produto:</label>
            <select id="temp-desc">
              <option value="">BUSQUE O PRODUTO...</option>
              <option value="TUBO PAPELÃO">TUBO PAPELÃO</option>
              <option value="TUBO PLÁSTICO">TUBO PLÁSTICO</option>
              <option value="TUBETE">TUBETE</option>
              <option value="CONE">CONE</option>
              <option value="CANTONEIRA">CANTONEIRA</option>
              <option value="ARRUELA">ARRUELA</option>
              <option value="BARRICA">BARRICA</option>
              <option value="APARA">APARA</option>
            </select>
          </div>
          <div class="grid-produtos">
            <div class="campo">
              <label>Medidas:</label><input type="text" id="temp-med" />
            </div>
            <div class="campo">
              <label>Qtd:</label
              ><input
                type="text"
                id="temp-qtd"
                class="input-decimal-restrito"
              />
            </div>
            <div class="campo">
              <label>Un:</label>
              <select id="temp-un">
                <option value="KG">KG</option>
                <option value="UNIDADES">UNIDADES</option>
                <option value="PEÇAS">PEÇAS</option>
              </select>
            </div>
            <div class="campo">
              <label>IPI%:</label
              ><input
                type="text"
                id="temp-ipi"
                class="input-decimal-restrito"
              />
            </div>
            <div class="campo">
              <label>ICMS%:</label
              ><input
                type="text"
                id="temp-icms"
                class="input-decimal-restrito"
              />
            </div>
            <div class="campo">
              <label>Unit. CIF:</label
              ><input
                type="text"
                id="temp-cif"
                class="input-decimal-restrito"
              />
            </div>
            <div class="campo">
              <label>Unit. FOB:</label
              ><input
                type="text"
                id="temp-fob"
                class="input-decimal-restrito"
              />
            </div>
          </div>
          <div class="area-botoes-form">
            <button
              type="button"
              class="btn-acao btn-cancelar"
              onclick="cancelarAdicao()"
            >
              Cancelar Adição
            </button>
            <button
              type="button"
              class="btn-acao btn-finalizar"
              onclick="finalizarAdicao()"
            >
              Finalizar Adição
            </button>
          </div>
        </div>
      </div>

      <div class="secao-divisor">
        <h3>Condições de Venda</h3>
        <div
          style="
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
          "
        >
          <div
            style="
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
              gap: 15px;
            "
          >
            <div class="campo">
              <label>Condição de Pagamento (Dias):</label
              ><input
                type="text"
                id="pagamento"
                class="valida-pdf apenas-numeros-inteiros"
              />
            </div>
            <div class="campo">
              <label>Prazo de Entrega (Dias):</label
              ><input
                type="text"
                id="prazo"
                class="valida-pdf apenas-numeros-inteiros"
              />
            </div>
            <div class="campo">
              <label>Validade da Cotação (Dias):</label
              ><input
                type="text"
                id="validade"
                class="valida-pdf apenas-numeros-inteiros"
              />
            </div>
          </div>
          <div class="campo" style="margin-top: 15px">
            <label>Observações:</label>
            <textarea id="obs" rows="3"></textarea>
          </div>
        </div>
      </div>

      <button class="btn-gerar-pdf" onclick="validarEGerar()">
        GERAR COTAÇÃO DE PRODUTOS
      </button>
    </div>

    <img
      id="logo_tubocone"
      src="https://i.imgur.com/83db2b.png"
      style="display: none"
      crossorigin="anonymous"
    />
    <img
      id="logo_tubonord"
      src="https://i.imgur.com/83e361.png"
      style="display: none"
      crossorigin="anonymous"
    />

    <script>
      let produtosAdicionados = [];
      let tsInstance = null;

      document.addEventListener("DOMContentLoaded", () => {
        tsInstance = new TomSelect("#temp-desc", {
          create: false,
          allowEmptyOption: true,
        });
        aplicarTravasRigorosas();
      });

      // FUNÇÃO QUE BLOQUEIA TUDO O QUE NÃO FOR PERMITIDO
      function aplicarTravasRigorosas() {
        // 1. Regra para Inteiros (Condição de Venda) - Somente Números
        document.querySelectorAll(".apenas-numeros-inteiros").forEach((el) => {
          el.addEventListener("input", function () {
            // Remove qualquer coisa que não seja número 0-9
            this.value = this.value.replace(/[^0-9]/g, "");
          });
        });

        // 2. Regra para Decimais (Produtos) - Somente Números e Vírgula
        document.querySelectorAll(".input-decimal-restrito").forEach((el) => {
          el.addEventListener("input", function () {
            let v = this.value;
            v = v.replace(/\./g, ","); // Troca ponto por vírgula na hora
            v = v.replace(/[^0-9,]/g, ""); // Apaga letras e outros símbolos

            // Impede mais de uma vírgula
            const partes = v.split(",");
            if (partes.length > 2)
              v = partes[0] + "," + partes.slice(1).join("");

            this.value = v;
          });
        });
      }

      function ajustarLogosHeader() {
        const sel = document.getElementById("empresa_emissora").value;
        document.getElementById("header_logo_tubocone").style.display =
          sel === "tubonord" ? "none" : "block";
        document.getElementById("header_logo_tubonord").style.display =
          sel === "tubocone" ? "none" : "block";
      }

      function mostrarFormProduto() {
        document.getElementById("form-produto-temp").style.display = "block";
        document.getElementById("btn-abrir-form").style.display = "none";
      }

      function cancelarAdicao() {
        // Limpa campos e remove alertas de erro
        const ids = [
          "temp-med",
          "temp-qtd",
          "temp-ipi",
          "temp-icms",
          "temp-cif",
          "temp-fob",
        ];
        ids.forEach((id) => {
          const el = document.getElementById(id);
          el.value = "";
          el.classList.remove("campo-vazio");
        });
        if (tsInstance) tsInstance.clear();
        document.getElementById("form-produto-temp").style.display = "none";
        document.getElementById("btn-abrir-form").style.display = "block";
      }

      function finalizarAdicao() {
        const desc = document.getElementById("temp-desc").value;
        const med = document.getElementById("temp-med").value;
        const qtd = document.getElementById("temp-qtd").value;

        // Validação obrigatória na hora de adicionar
        let erro = false;
        if (!desc) {
          alert("Selecione um produto!");
          erro = true;
        }
        if (!med) {
          document.getElementById("temp-med").classList.add("campo-vazio");
          erro = true;
        }
        if (!qtd) {
          document.getElementById("temp-qtd").classList.add("campo-vazio");
          erro = true;
        }

        if (erro) return;

        produtosAdicionados.push({
          desc: desc,
          med: med.toUpperCase(),
          qtd: qtd,
          un: document.getElementById("temp-un").value,
          ipi: document.getElementById("temp-ipi").value || "0",
          icms: document.getElementById("temp-icms").value || "0",
          cif: document.getElementById("temp-cif").value || "0,00",
          fob: document.getElementById("temp-fob").value || "0,00",
        });

        renderizarLista();
        cancelarAdicao();
      }

      function renderizarLista() {
        const lista = document.getElementById("lista-finalizada");
        lista.innerHTML = "";
        produtosAdicionados.forEach((p, i) => {
          lista.innerHTML += `
                <div class="card-produto">
                    <div><b>${p.desc}</b> | ${p.med} | ${p.qtd} ${p.un}</div>
                    <button type="button" class="btn-remover-card" onclick="removerProduto(${i})">Remover</button>
                </div>`;
        });
      }

      function removerProduto(i) {
        produtosAdicionados.splice(i, 1);
        renderizarLista();
      }

      // VALIDAÇÃO ANTES DE GERAR PDF
      function validarEGerar() {
        // Bloqueia se o formulário de produto ainda estiver aberto
        if (
          document.getElementById("form-produto-temp").style.display === "block"
        ) {
          alert(
            "Você ainda está preenchendo um produto! Clique em 'Finalizar Adição' ou 'Cancelar' antes de gerar o PDF."
          );
          return;
        }

        let erros = 0;
        document.querySelectorAll(".valida-pdf").forEach((c) => {
          if (!c.value) {
            c.classList.add("campo-vazio");
            erros++;
          } else {
            c.classList.remove("campo-vazio");
          }
        });

        if (produtosAdicionados.length === 0) {
          alert("Adicione pelo menos 1 produto!");
          erros++;
        }

        if (erros > 0) {
          alert("Preencha todos os campos obrigatórios!");
          return;
        }

        gerarPDF();
      }

      async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const azul = [0, 45, 91];

        const emissor = document.getElementById("empresa_emissora").value;
        const info =
          emissor === "tubocone"
            ? {
                n: "TUBOCONE INDUSTRIA E COMERCIO DE EMBALAGENS EIRELI - EPP",
                e: "AV PRES CASTELO BRANCO, 2010 - BR 116 KM 37 - CATOLE",
                c: "HORIZONTE/CE - CEP: 62887-285",
                f: "FONE: (85) 3336-1414",
              }
            : {
                n: "TUBONORD INDUSTRIA E COMERCIO DE EMBALAGENS LTDA",
                e: "AV DR LUCAS SOARES CARDOSO, 1335 - DISTRITO INDUSTRIAL",
                c: "BEZERROS/PE - CEP: 55660-000",
                f: "FONE: (85) 99401-3853",
              };

        const logoData = await converterLogo(
          emissor === "tubocone" ? "logo_tubocone" : "logo_tubonord"
        );

        doc.setFillColor(azul[0], azul[1], azul[2]);
        doc.rect(0, 0, 210, 42, "F");
        doc.rect(0, 260, 210, 37, "F");

        if (logoData) {
          doc.addImage(logoData, "PNG", 15, 12, 38, 15);
          doc.addImage(logoData, "PNG", 15, 270, 38, 15);
        }

        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold");
        doc.text(info.n, 60, 15);
        doc.text(info.n, 60, 272);
        doc.setFontSize(8);
        doc.setFont("helvetica", "normal");
        doc.text(`${info.e} | ${info.c}`, 60, 21);
        doc.text(info.f, 60, 26);

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10);
        doc.setFont("helvetica", "bold");
        doc.text("COTAÇÃO DE PRODUTOS", 15, 52);
        doc.line(15, 54, 195, 54);
        doc.text(
          `CLIENTE: ${document.getElementById("cliente").value.toUpperCase()}`,
          15,
          62
        );
        doc.text(
          `COTADO POR: ${document.getElementById("att").value.toUpperCase()}`,
          15,
          68
        );

        const tableBody = produtosAdicionados.map((p) => [
          p.desc,
          p.med,
          `${p.qtd} ${p.un}`,
          p.ipi + "%",
          p.icms + "%",
          "R$ " + p.cif,
          "R$ " + p.fob,
        ]);

        doc.autoTable({
          startY: 75,
          head: [
            [
              "DESCRIÇÃO",
              "MEDIDAS",
              "QTD/UN",
              "IPI",
              "ICMS",
              "VLR CIF",
              "VLR FOB",
            ],
          ],
          body: tableBody,
          headStyles: { fillColor: azul },
          theme: "grid",
          styles: { fontSize: 7, halign: "center" },
        });

        let finalY = doc.lastAutoTable.finalY + 10;
        doc.setFont("helvetica", "bold");
        doc.text("CONDIÇÕES GERAIS", 15, finalY);
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.text(
          `CONDIÇÃO PGTO: ${document.getElementById("pagamento").value} DIAS`,
          15,
          finalY + 7
        );
        doc.text(
          `ENTREGA: ${document.getElementById("prazo").value} DIAS`,
          85,
          finalY + 7
        );
        doc.text(
          `VALIDADE: ${document.getElementById("validade").value} DIAS`,
          150,
          finalY + 7
        );

        doc.save(
          `COTACAO_${
            document.getElementById("cliente").value || "PRODUTOS"
          }.pdf`
        );
      }

      async function converterLogo(id) {
        try {
          const img = document.getElementById(id);
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          return canvas.toDataURL("image/png");
        } catch (e) {
          return null;
        }
      }

      document.addEventListener("input", (e) => {
        if (
          e.target.tagName === "INPUT" &&
          e.target.type === "text" &&
          !e.target.classList.contains("apenas-numeros-inteiros") &&
          !e.target.classList.contains("input-decimal-restrito")
        ) {
          e.target.value = e.target.value.toUpperCase();
        }
      });
    </script>
  </body>
</html>
